<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric Brookfield – Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Libre+Franklin:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a2a3a;
      --charcoal: #2d3748;
      --gold: #c9a962;
      --cream: #faf9f7;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8e6e3 0%, #d4d2cf 100%);
      font-family: 'Libre Franklin', sans-serif;
      padding: 2rem;
    }

    .card-container {
      perspective: 1000px;
    }

    .business-card {
      width: 3.5in;
      height: 2in;
      background: var(--navy);
      border-radius: 8px;
      padding: 0;
      position: relative;
      box-shadow: 
        0 25px 50px -12px rgba(26, 42, 58, 0.4),
        0 12px 24px -8px rgba(26, 42, 58, 0.3),
        0 0 0 1px rgba(201, 169, 98, 0.1);
      animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transform: translateY(20px) rotateX(5deg);
      opacity: 0;
      transition: transform 0.15s ease-out, box-shadow 0.3s ease;
      transform-style: preserve-3d;
    }

    @keyframes cardEntry {
      to {
        transform: translateY(0) rotateX(0);
        opacity: 1;
      }
    }

    /* Subtle texture overlay */
    .business-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 100% 0%, rgba(201, 169, 98, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 0% 100%, rgba(201, 169, 98, 0.05) 0%, transparent 40%);
      pointer-events: none;
    }

    .card-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1.25rem 1.5rem;
      overflow: hidden;
      border-radius: 8px;
    }

    /* Minimal icon - stylized prompt cursor */
    .icon {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      width: 28px;
      height: 28px;
      opacity: 0;
      animation: iconFade 0.5s ease 0.6s forwards;
    }

    @keyframes iconFade {
      to { opacity: 1; }
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    /* Gold accent line */
    .accent-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--gold) 0%, rgba(201, 169, 98, 0.3) 100%);
      transform: scaleX(0);
      transform-origin: left;
      animation: lineReveal 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.4s forwards;
    }

    @keyframes lineReveal {
      to { transform: scaleX(1); }
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.65rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.02em;
      margin-bottom: 0.6rem;
      opacity: 0;
      transform: translateY(10px);
      animation: textReveal 0.5s ease 0.3s forwards;
    }

    @keyframes textReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tagline {
      font-size: 0.7rem;
      font-weight: 300;
      color: rgba(250, 249, 247, 0.7);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: textReveal 0.5s ease 0.5s forwards;
    }

    /* Interactive border glow */
    .business-card::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 10px;
      background: radial-gradient(
        400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(201, 169, 98, 0.2),
        rgba(201, 169, 98, 0.05) 30%,
        transparent 50%
      );
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .business-card:hover::after {
      opacity: 1;
    }

    /* Hover polish */
    .business-card:hover {
      box-shadow: 
        0 30px 60px -15px rgba(26, 42, 58, 0.5),
        0 15px 30px -10px rgba(26, 42, 58, 0.35),
        0 0 0 1px rgba(201, 169, 98, 0.3);
    }

    .business-card:hover .icon svg path {
      stroke: var(--gold);
      transition: stroke 0.3s ease;
    }

    /* Print styles */
    @media print {
      body {
        background: white;
        padding: 0;
      }
      .business-card {
        box-shadow: none;
        animation: none;
        opacity: 1;
        transform: none;
      }
      .name, .tagline, .icon {
        animation: none;
        opacity: 1;
        transform: none;
      }
      .accent-line {
        animation: none;
        transform: scaleX(1);
      }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="business-card">
      <div class="card-content">
        <div class="icon">
          <!-- Minimal prompt/terminal icon -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 10L12 14L7 18" stroke="rgba(201, 169, 98, 0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 18H21" stroke="rgba(201, 169, 98, 0.6)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="name">Eric Brookfield</h1>
        <p class="tagline">I know how to prompt Claude Code</p>
      </div>
      <div class="accent-line"></div>
    </div>
  </div>
</body>
<script>
  const card = document.querySelector('.business-card');
  
  // Wait for entry animation to complete
  card.addEventListener('animationend', () => {
    card.style.animation = 'none';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0) rotateX(0) rotateY(0)';
  });
  
  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    // Calculate tilt based on mouse position
    const tiltX = ((y / rect.height) - 0.5) * -12;
    const tiltY = ((x / rect.width) - 0.5) * 12;
    
    card.style.setProperty('--mouse-x', `${x}px`);
    card.style.setProperty('--mouse-y', `${y}px`);
    card.style.transform = `translateY(-4px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  });
  
  card.addEventListener('mouseleave', () => {
    card.style.setProperty('--mouse-x', '50%');
    card.style.setProperty('--mouse-y', '50%');
    card.style.transform = 'translateY(0) rotateX(0) rotateY(0)';
  });
</script>
</html>
